<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastPOS - Premium Restaurant OS</title>
    <!-- Tailwind CSS (CDN for Development) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-base': '#0a0a0c', /* Slightly warmer absolute dark */
              'bg-surface': '#121216', /* Dark slate/charcoal */
              'bg-glass': 'rgba(255, 255, 255, 0.03)',
              
              /* Gastronomy Premium Palette */
              'accent-primary': '#ea580c', /* Flame Orange - Appetite & Energy */
              'accent-secondary': '#f59e0b', /* Saffron/Amber - Premium food */
              'accent-tertiary': '#e11d48', /* Crimson - Heat/Spice */
              
              'success': '#10b981', /* Fresh Basil */
              'warning': '#f59e0b',
              'danger': '#e11d48',
              'info': '#0ea5e9',
              
              'text-primary': '#f8fafc',
              'text-secondary': '#a1a1aa',
              'text-tertiary': '#71717a',
              
              'border-subtle': 'rgba(255, 255, 255, 0.04)',
              'border-light': 'rgba(255, 255, 255, 0.08)',
              'border-focus': 'rgba(234, 88, 12, 0.4)', /* Orange focus */
            },
            boxShadow: {
              'glow': '0 0 40px rgba(234, 88, 12, 0.15)',
              'inner': 'inset 0 1px 0 rgba(255, 255, 255, 0.05)',
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
